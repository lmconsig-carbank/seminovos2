<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LM Consig - Reserva</title>
    <meta name="theme-color" content="#2196F3"/>
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }

        /* TELA DE INSTALAÇÃO (SPLASH SCREEN) */
        #installOverlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            z-index: 20000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: white;
            padding: 10px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        p {
            font-size: 16px;
            margin-bottom: 40px;
            max-width: 300px;
            line-height: 1.5;
            opacity: 0.9;
        }

        /* BOTÃO E STATUS */
        #installBtnLarge {
            background-color: #ffffff;
            color: #1976D2;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #installStatus {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .spinner-white {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-left-color: #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #skipBtn {
            margin-top: 30px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
        }

        /* CONTEÚDO DO APP (IFRAME) */
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 15000;
            transition: opacity 0.5s ease-out;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <!-- TELA DE INSTALAÇÃO EM TELA CHEIA -->
    <div id="installOverlay">
        <div class="logo-container">
            <img src="icon-192.png" alt="LM Consig" onerror="this.src='https://via.placeholder.com/192/FFFFFF/2196F3?text=LM'">
        </div>
        
        <div id="initialContent">
            <h1>LM Consig - Reserva</h1>
            <p>Instale nosso aplicativo para uma melhor experiência e acesso rápido direto da sua tela inicial.</p>
            <button id="installBtnLarge">INSTALAR APLICATIVO AGORA</button>
            <br>
            <button id="skipBtn">Continuar no navegador</button>
        </div>

        <div id="installStatus">
            <div class="spinner-white"></div>
            <h1 id="statusTitle">Instalando...</h1>
            <p id="statusDesc">Siga as instruções na tela do seu navegador para concluir a instalação.</p>
        </div>
    </div>

    <!-- TELA DE CARREGAMENTO -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner-white" style="border-left-color: #2196F3; border-top-color: rgba(0,0,0,0.1); border-right-color: rgba(0,0,0,0.1); border-bottom-color: rgba(0,0,0,0.1);"></div>
        <div style="color: #333; font-size: 1.2em;">Carregando LM Consig...</div>
    </div>

    <!-- O SEU SCRIPT DO GOOGLE -->
    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbw1O5IXNRp6FOpQlsoUclx_4rn4HHIslnBIEpTCKJMpv0ESS0mpNg3DcJ6p1RFE8Q51/exec" frameborder="0" allowfullscreen></iframe>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        let deferredPrompt;
        const installOverlay = document.getElementById('installOverlay');
        const initialContent = document.getElementById('initialContent');
        const installStatus = document.getElementById('installStatus');
        const installBtnLarge = document.getElementById('installBtnLarge');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const skipBtn = document.getElementById('skipBtn');

        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        window.addEventListener('beforeinstallprompt', (e) => {
            if (isStandalone) return;
            e.preventDefault();
            deferredPrompt = e;
            installOverlay.style.display = 'flex';
        });

        installBtnLarge.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Muda para o estado de "Instalando"
                initialContent.style.display = 'none';
                installStatus.style.display = 'flex';
                
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                
                if (outcome === 'accepted') {
                    statusTitle.innerText = "Quase lá!";
                    statusDesc.innerText = "Aguarde a conclusão da instalação no seu dispositivo.";
                } else {
                    // Se o usuário cancelar, volta ao estado inicial
                    initialContent.style.display = 'block';
                    installStatus.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        skipBtn.addEventListener('click', () => {
            installOverlay.style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            // Sucesso final
            statusTitle.innerText = "Sucesso!";
            statusDesc.innerHTML = "O aplicativo foi instalado!<br><br><b>Feche esta aba do navegador</b> e abra o ícone 'LM Consig' na sua tela inicial.";
            document.querySelector('.spinner-white').style.display = 'none';
            
            // Opcional: Tenta fechar a aba após 5 segundos (navegadores podem bloquear isso)
            setTimeout(() => {
                console.log('Instalação finalizada.');
            }, 5000);
        });

        document.getElementById('appFrame').onload = function() {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('hidden');
            setTimeout(() => loadingScreen.style.display = 'none', 500);
        };
    </script>
</body>
</html>
